site_name: Particle Man
site_url: https://mnestrud.github.io/particle-man/
repo_url: https://github.com/mnestrud/particle-man
repo_name: mnestrud/particle-man
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/icon.png
  favicon: assets/icon.png
  palette:
    - scheme: default
      primary: blue
      accent: light-blue
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.tabs.link

nav:
  - Home: index.md
  - Setup: setup.md
  - Sensors: sensors.md
  - Weather: weather.md
  - Examples: examples.md
  - Reference: reference.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
