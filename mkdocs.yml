site_name: Particle Man
site_url: https://mnestrud.github.io/particle-man/
repo_url: https://github.com/mnestrud/particle-man
repo_name: mnestrud/particle-man
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/icon.png
  favicon: assets/icon.png
  palette:
    - scheme: default
      primary: blue
      accent: light-blue
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit

nav:
  - Using Particle Man:
    - Getting Started: index.md
    - What's Included: sensors.md
    - Weather: weather.md
    - Dashboard Examples: dashboard.md
    - Automations & Blueprints: automations.md
  - Reference:
    - API Usage & Free Tier: api-usage.md
    - Configuration Reference: configuration.md
    - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
